<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#FFFFFF"/>
  <text x="60" y="48" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">DOCUMENT CLASSIFICATION  ·  SYSTEM DIAGRAM</text>
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#E0E0E0" stroke-width="1"/>

  <!-- DOCUMENT STACK -->
  <rect x="92" y="164" width="130" height="98" rx="5" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="102" y="154" width="130" height="98" rx="5" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="112" y="144" width="130" height="98" rx="5" fill="#FFFFFF" stroke="#444444" stroke-width="1.5"/>
  <line x1="130" y1="168" x2="224" y2="168" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="130" y1="182" x2="224" y2="182" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="130" y1="196" x2="200" y2="196" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="130" y1="210" x2="218" y2="210" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="177" y="266" font-family="monospace" font-size="10" letter-spacing="1" fill="#444444" text-anchor="middle">INCOMING</text>
  <text x="177" y="280" font-family="monospace" font-size="10" letter-spacing="1" fill="#444444" text-anchor="middle">DOCUMENTS</text>
  <text x="177" y="296" font-family="monospace" font-size="9" letter-spacing="0.5" fill="#888888" text-anchor="middle">claims · invoices · legal</text>

  <!-- Arrow: docs to gate -->
  <line x1="244" y1="193" x2="394" y2="312" stroke="#444444" stroke-width="1.5"/>
  <polygon points="394,312 381,299 389,290" fill="#444444"/>

  <!-- CONFIDENCE GATE -->
  <rect x="396" y="252" width="280" height="148" rx="8" fill="#FFFFFF" stroke="#7A5F00" stroke-width="2"/>
  <rect x="396" y="252" width="280" height="36" rx="8" fill="#FFE500" fill-opacity="0.20"/>
  <rect x="396" y="278" width="280" height="10" fill="#FFE500" fill-opacity="0.20"/>
  <polygon points="420,268 433,283 420,298 407,283" fill="none" stroke="#7A5F00" stroke-width="2"/>
  <text x="421" y="288" font-family="monospace" font-size="11" fill="#7A5F00" text-anchor="middle">?</text>
  <text x="540" y="276" font-family="monospace" font-size="11" letter-spacing="2" fill="#7A5F00" text-anchor="middle">CONFIDENCE GATE</text>
  <text x="536" y="314" font-family="monospace" font-size="10" letter-spacing="1" fill="#0A0A0A" text-anchor="middle">score evaluated per document</text>
  <text x="536" y="330" font-family="monospace" font-size="10" letter-spacing="1" fill="#444444" text-anchor="middle">route decision made here</text>
  <text x="536" y="348" font-family="monospace" font-size="9" letter-spacing="0.5" fill="#888888" text-anchor="middle">threshold: configurable · not per-operator</text>
  <text x="536" y="362" font-family="monospace" font-size="9" letter-spacing="0.5" fill="#888888" text-anchor="middle">applies uniformly across document types</text>

  <!-- UPPER BRANCH: high confidence -->
  <line x1="676" y1="293" x2="798" y2="208" stroke="#444444" stroke-width="2"/>
  <polygon points="798,208 784,218 793,205" fill="#444444"/>
  <text x="742" y="238" font-family="monospace" font-size="9" letter-spacing="0.8" fill="#444444" text-anchor="middle">score ≥ threshold</text>

  <!-- Team Queue -->
  <rect x="800" y="140" width="224" height="132" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="912" y="166" font-family="monospace" font-size="11" letter-spacing="1.5" fill="#0A0A0A" text-anchor="middle">TEAM QUEUE</text>
  <line x1="816" y1="174" x2="1008" y2="174" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="816" y="184" width="142" height="12" rx="2" fill="#E0E0E0"/>
  <rect x="970" y="184" width="28" height="12" rx="2" fill="#EBEBEB"/>
  <rect x="816" y="202" width="114" height="12" rx="2" fill="#E0E0E0"/>
  <rect x="970" y="202" width="28" height="12" rx="2" fill="#EBEBEB"/>
  <rect x="816" y="220" width="154" height="12" rx="2" fill="#E0E0E0"/>
  <rect x="970" y="220" width="28" height="12" rx="2" fill="#EBEBEB"/>
  <!-- Annotation: score recessive -->
  <line x1="999" y1="202" x2="1056" y2="185" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="1058" y="167" width="80" height="36" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="1098" y="181" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">score visible,</text>
  <text x="1098" y="193" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">not the lead</text>

  <!-- LOWER BRANCH: below threshold -->
  <line x1="676" y1="355" x2="798" y2="462" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="798,462 784,449 796,444" fill="#0A0A0A"/>
  <text x="742" y="418" font-family="monospace" font-size="9" letter-spacing="0.8" fill="#0A0A0A" text-anchor="middle">score &lt; threshold</text>

  <!-- REVIEW CARD — primary design artifact -->
  <rect x="800" y="462" width="278" height="256" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.5"/>
  <rect x="800" y="462" width="278" height="36" rx="8" fill="#0A0A0A"/>
  <rect x="800" y="488" width="278" height="10" fill="#0A0A0A"/>
  <text x="939" y="485" font-family="monospace" font-size="10" letter-spacing="2.5" fill="#FFFFFF" text-anchor="middle">REVIEW CARD</text>
  <text x="818" y="516" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888">CHOSEN CATEGORY</text>
  <rect x="818" y="522" width="166" height="18" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="818" y="522" width="18" height="18" rx="3" fill="#0A0A0A"/>
  <text x="818" y="558" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888">CLOSEST ALTERNATIVE</text>
  <rect x="818" y="564" width="166" height="18" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="818" y="600" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888">REASON</text>
  <rect x="818" y="606" width="242" height="30" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="828" y="613" width="112" height="6" rx="2" fill="#E0E0E0"/>
  <rect x="828" y="623" width="80" height="6" rx="2" fill="#E0E0E0"/>
  <rect x="818" y="654" width="116" height="20" rx="3" fill="#0A0A0A"/>
  <text x="876" y="668" font-family="monospace" font-size="9" letter-spacing="0.8" fill="#FFFFFF" text-anchor="middle">CONFIRM ROUTE</text>
  <rect x="942" y="654" width="110" height="20" rx="3" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="997" y="668" font-family="monospace" font-size="9" letter-spacing="0.8" fill="#0A0A0A" text-anchor="middle">RECLASSIFY</text>

  <!-- Annotation: only place uncertainty exists -->
  <line x1="818" y1="540" x2="748" y2="556" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="598" y="540" width="146" height="36" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="671" y="554" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">only place uncertainty</text>
  <text x="671" y="566" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">exists in the system</text>

  <!-- Feedback arc: review → prompt management -->
  <path d="M 800 582 Q 672 650 556 642 Q 440 634 420 402" stroke="#888888" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <polygon points="420,402 416,416 428,413" fill="#888888"/>
  <text x="586" y="700" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">"why did this hit uncertain?"  →  feeds prompt management layer</text>

  <!-- Legend -->
  <line x1="60" y1="754" x2="1140" y2="754" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="60" y1="768" x2="82" y2="768" stroke="#0A0A0A" stroke-width="2"/>
  <text x="88" y="772" font-family="monospace" font-size="9" fill="#444444">primary path</text>
  <line x1="194" y1="768" x2="216" y2="768" stroke="#888888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="222" y="772" font-family="monospace" font-size="9" fill="#444444">annotation / feedback</text>
  <rect x="370" y="762" width="12" height="12" rx="2" fill="#FFE500" fill-opacity="0.25" stroke="#7A5F00" stroke-width="1"/>
  <text x="388" y="772" font-family="monospace" font-size="9" fill="#444444">decision node</text>
  <rect x="474" y="762" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="492" y="772" font-family="monospace" font-size="9" fill="#444444">design artifact</text>
  <text x="1140" y="772" font-family="monospace" font-size="9" fill="#888888" text-anchor="end">Allianz · IDAS · Document Classification</text>
</svg>
