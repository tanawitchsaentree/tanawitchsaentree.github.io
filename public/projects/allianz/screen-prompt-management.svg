<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#FFFFFF"/>
  <text x="60" y="48" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">PROMPT MANAGEMENT  ·  SYSTEM DIAGRAM</text>
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#E0E0E0" stroke-width="1"/>

  <!-- COLUMN HEADERS -->
  <text x="148" y="96" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888" text-anchor="middle">BEFORE</text>
  <text x="730" y="96" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888" text-anchor="middle">AFTER</text>
  <line x1="444" y1="88" x2="444" y2="720" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ═══════════════════════════════════════════
       LEFT SIDE: OLD LOOP — slow, gated
  ════════════════════════════════════════════ -->

  <!-- Node: Configurator notices issue -->
  <rect x="78" y="120" width="140" height="48" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="140" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">CONFIGURATOR</text>
  <text x="148" y="155" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">notices misclassification</text>

  <!-- Arrow down -->
  <line x1="148" y1="168" x2="148" y2="204" stroke="#888888" stroke-width="1.5"/>
  <polygon points="148,204 143,194 153,194" fill="#888888"/>

  <!-- Node: File ticket -->
  <rect x="78" y="204" width="140" height="40" rx="6" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="226" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">FILE TICKET</text>
  <text x="148" y="238" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">wait for queue</text>

  <!-- Arrow + time label -->
  <line x1="148" y1="244" x2="148" y2="282" stroke="#888888" stroke-width="1.5"/>
  <polygon points="148,282 143,272 153,272" fill="#888888"/>
  <rect x="154" y="254" width="52" height="16" rx="3" fill="#EBEBEB"/>
  <text x="180" y="265" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">days</text>

  <!-- Node: Engineer reads prompt -->
  <rect x="68" y="282" width="160" height="40" rx="6" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="304" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">ENGINEER</text>
  <text x="148" y="316" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">reads prompt aloud</text>

  <line x1="148" y1="322" x2="148" y2="360" stroke="#888888" stroke-width="1.5"/>
  <polygon points="148,360 143,350 153,350" fill="#888888"/>

  <!-- Node: Decide to change -->
  <rect x="78" y="360" width="140" height="40" rx="6" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="382" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">DECIDE CHANGE</text>
  <text x="148" y="394" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">another ticket</text>

  <line x1="148" y1="400" x2="148" y2="438" stroke="#888888" stroke-width="1.5"/>
  <polygon points="148,438 143,428 153,428" fill="#888888"/>
  <rect x="154" y="412" width="52" height="16" rx="3" fill="#EBEBEB"/>
  <text x="180" y="423" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">days</text>

  <!-- Node: Deploy -->
  <rect x="78" y="438" width="140" height="40" rx="6" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="460" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">DEPLOY</text>
  <text x="148" y="472" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">deployment window</text>

  <line x1="148" y1="478" x2="148" y2="516" stroke="#888888" stroke-width="1.5"/>
  <polygon points="148,516 143,506 153,506" fill="#888888"/>

  <!-- Node: Observe -->
  <rect x="78" y="516" width="140" height="40" rx="6" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="148" y="538" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">OBSERVE</text>
  <text x="148" y="550" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">hope it improved</text>

  <!-- Close old loop -->
  <path d="M 78 536 Q 26 536 26 328 Q 26 140 78 140" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
  <polygon points="78,140 68,133 68,147" fill="#888888"/>
  <text x="18" y="340" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle" transform="rotate(-90 18 340)">WEEKS PER CYCLE</text>

  <!-- BEFORE label -->
  <rect x="80" y="596" width="136" height="20" rx="3" fill="#EBEBEB"/>
  <text x="148" y="610" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#888888" text-anchor="middle">BEFORE</text>
  <text x="148" y="638" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">configurator → ticket</text>
  <text x="148" y="652" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">→ engineer → deploy</text>
  <text x="148" y="666" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">→ observe  ×  every step</text>

  <!-- ═══════════════════════════════════════════
       RIGHT SIDE: NEW LOOP — fast, gate only at publish
  ════════════════════════════════════════════ -->

  <!-- Node: Configurator drafts -->
  <rect x="530" y="120" width="148" height="48" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="604" y="140" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">CONFIGURATOR</text>
  <text x="604" y="155" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">writes / edits prompt</text>

  <line x1="604" y1="168" x2="604" y2="204" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="604,204 599,194 609,194" fill="#0A0A0A"/>
  <rect x="610" y="178" width="42" height="16" rx="3" fill="#FFE500" fill-opacity="0.3"/>
  <text x="631" y="189" font-family="monospace" font-size="8" fill="#7A5F00" text-anchor="middle">DRAFT</text>

  <!-- Node: Test harness -->
  <rect x="510" y="204" width="188" height="88" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <rect x="510" y="204" width="188" height="30" rx="8" fill="#0A0A0A"/>
  <rect x="510" y="224" width="188" height="10" fill="#0A0A0A"/>
  <text x="604" y="222" font-family="monospace" font-size="9" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">TEST HARNESS</text>
  <!-- Synthetic tag -->
  <rect x="526" y="244" width="68" height="16" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="560" y="255" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">SYNTHETIC</text>
  <!-- Historical tag -->
  <rect x="606" y="244" width="74" height="16" rx="3" fill="#FFE500" fill-opacity="0.25" stroke="#7A5F00" stroke-width="1"/>
  <text x="643" y="255" font-family="monospace" font-size="8" fill="#7A5F00" text-anchor="middle">HISTORICAL</text>
  <text x="604" y="276" font-family="monospace" font-size="8" fill="#444444" text-anchor="middle">side-by-side vs live prompt</text>
  <text x="604" y="288" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">results before anyone approves</text>

  <!-- Callout: the split is deliberate -->
  <line x1="698" y1="258" x2="750" y2="248" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="752" y="230" width="160" height="36" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="832" y="244" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">synthetic: fast / happy path</text>
  <text x="832" y="256" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">historical: real edge cases</text>
  <text x="832" y="268" font-family="monospace" font-size="9" fill="#7A5F00" text-anchor="middle">deliberate split, not a hedge</text>

  <line x1="604" y1="292" x2="604" y2="328" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="604,328 599,318 609,318" fill="#0A0A0A"/>

  <!-- Node: Submit for approval — gate -->
  <rect x="510" y="328" width="188" height="64" rx="6" fill="#F5F5F5" stroke="#444444" stroke-width="1.5"/>
  <text x="604" y="352" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">SUBMIT FOR APPROVAL</text>
  <text x="604" y="368" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">reviewer sees test results</text>
  <text x="604" y="380" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">not "is it safe?" → "does it fit intent?"</text>

  <!-- Arrow to publish -->
  <line x1="604" y1="392" x2="604" y2="428" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="604,428 599,418 609,418" fill="#0A0A0A"/>

  <!-- Node: Publish — THE gate -->
  <rect x="510" y="428" width="188" height="48" rx="6" fill="#0A0A0A"/>
  <text x="604" y="450" font-family="monospace" font-size="10" letter-spacing="1" fill="#FFFFFF" text-anchor="middle">PUBLISH</text>
  <text x="604" y="464" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">engineering in loop here only</text>

  <!-- Gate label annotation -->
  <line x1="698" y1="452" x2="756" y2="452" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3 3"/>
  <rect x="758" y="438" width="168" height="28" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="842" y="451" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">gate only at publish —</text>
  <text x="842" y="463" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">not at draft / not at test</text>

  <line x1="604" y1="476" x2="604" y2="512" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="604,512 599,502 609,502" fill="#0A0A0A"/>

  <!-- Node: Version history -->
  <rect x="510" y="512" width="188" height="56" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="604" y="534" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">VERSION HISTORY</text>
  <text x="604" y="550" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">who approved · test results</text>
  <text x="604" y="562" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">at time of publish</text>

  <!-- Close new loop — fast iteration arc -->
  <path d="M 510 540 Q 456 540 456 328 Q 456 168 510 168" stroke="#0A0A0A" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <polygon points="510,168 500,161 500,175" fill="#0A0A0A"/>
  <text x="448" y="356" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle" transform="rotate(-90 448 356)">DAILY CYCLE</text>

  <!-- AFTER label -->
  <rect x="530" y="596" width="148" height="20" rx="3" fill="#0A0A0A"/>
  <text x="604" y="610" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#FFFFFF" text-anchor="middle">AFTER</text>
  <text x="604" y="638" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">draft → test → approve</text>
  <text x="604" y="652" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">→ publish (gate once)</text>
  <text x="604" y="666" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">engineering off critical path</text>

  <!-- Legend -->
  <line x1="60" y1="754" x2="1140" y2="754" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="762" width="10" height="10" rx="2" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="1"/>
  <text x="76" y="771" font-family="monospace" font-size="9" fill="#444444">old loop — blocked, slow</text>
  <rect x="222" y="762" width="10" height="10" rx="2" fill="#0A0A0A"/>
  <text x="238" y="771" font-family="monospace" font-size="9" fill="#444444">new loop — gate only at publish</text>
  <rect x="436" y="762" width="10" height="10" rx="2" fill="#FFE500" fill-opacity="0.3" stroke="#7A5F00" stroke-width="1"/>
  <text x="452" y="771" font-family="monospace" font-size="9" fill="#444444">test set: historical edge cases</text>
  <line x1="626" y1="767" x2="648" y2="767" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="654" y="771" font-family="monospace" font-size="9" fill="#444444">annotation</text>
  <text x="1140" y="771" font-family="monospace" font-size="9" fill="#888888" text-anchor="end">Allianz · IDAS · Prompt Management</text>
</svg>
