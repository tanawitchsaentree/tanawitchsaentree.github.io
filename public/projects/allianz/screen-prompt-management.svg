  <rect x="628" y="132" width="528" height="1" fill="#DDE3EE"/>
  <!-- Test input -->
  <rect x="628" y="152" width="528" height="80" rx="8" fill="#FAF7F2" stroke="#DDE3EE"/>
  <rect x="644" y="168" width="300" height="10" rx="2" fill="#3D5475" fill-opacity="0.4"/>
  <rect x="644" y="188" width="200" height="10" rx="2" fill="#3D5475" fill-opacity="0.3"/>
  <!-- Run button -->
  <rect x="1056" y="244" width="80" height="32" rx="6" fill="#003781"/>
