  <rect x="44" y="188" width="280" height="10" rx="2" fill="#3D5475" fill-opacity="0.3"/>
  <rect x="44" y="208" width="380" height="10" rx="2" fill="#3D5475" fill-opacity="0.3"/>
  <rect x="44" y="228" width="200" height="10" rx="2" fill="#3D5475" fill-opacity="0.2"/>
  <rect x="44" y="268" width="360" height="10" rx="2" fill="#003781" fill-opacity="0.4"/>
