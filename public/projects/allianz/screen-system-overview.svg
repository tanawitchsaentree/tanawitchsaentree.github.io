<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#FFFFFF"/>
  <text x="60" y="48" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">IDAS — SYSTEM OVERVIEW  ·  THREE LAYERS, ONE CONTRACT</text>
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ── LAYER 1: OPERATOR ──────────────────────────────────────── -->
  <!-- Left label -->
  <text x="52" y="180" font-family="monospace" font-size="9" letter-spacing="2" fill="#888888" text-anchor="end" transform="rotate(-90 52 180)">LAYER 1</text>

  <rect x="80" y="108" width="1060" height="148" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <!-- Layer header -->
  <text x="108" y="136" font-family="monospace" font-size="10" letter-spacing="2" fill="#888888">OPERATOR LAYER  ·  DOCUMENT CLASSIFICATION</text>
  <line x1="80" y1="144" x2="1140" y2="144" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Operator flow: doc in → confidence gate → team queue OR review card -->
  <rect x="108" y="156" width="120" height="44" rx="5" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="168" y="174" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">DOCUMENT</text>
  <text x="168" y="188" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">INTAKE</text>

  <line x1="228" y1="178" x2="268" y2="178" stroke="#444444" stroke-width="1.5"/>
  <polygon points="268,178 260,174 260,182" fill="#444444"/>

  <rect x="268" y="156" width="120" height="44" rx="5" fill="#FFE500" fill-opacity="0.15" stroke="#7A5F00" stroke-width="1.5"/>
  <text x="328" y="174" font-family="monospace" font-size="9" fill="#7A5F00" text-anchor="middle">CONFIDENCE</text>
  <text x="328" y="188" font-family="monospace" font-size="9" fill="#7A5F00" text-anchor="middle">GATE</text>

  <!-- High confidence branch -->
  <line x1="388" y1="170" x2="440" y2="160" stroke="#888888" stroke-width="1.5"/>
  <polygon points="440,160 430,158 432,168" fill="#888888"/>
  <rect x="440" y="148" width="120" height="30" rx="4" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="500" y="167" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">TEAM QUEUE →</text>

  <!-- Low confidence branch -->
  <line x1="388" y1="186" x2="440" y2="196" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="440,196 430,192 432,202" fill="#0A0A0A"/>
  <rect x="440" y="184" width="120" height="30" rx="5" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="500" y="203" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">REVIEW CARD →</text>

  <!-- Dependency arrow pointing DOWN to configurator layer -->
  <text x="700" y="170" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">operator layer depends on:</text>
  <text x="700" y="184" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">configurator layer setting the right threshold + prompts</text>
  <text x="700" y="198" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">fallback layer catching what the gate misses</text>

  <!-- Down arrow: operator → configurator -->
  <line x1="600" y1="256" x2="600" y2="292" stroke="#444444" stroke-width="2"/>
  <polygon points="600,292 595,282 605,282" fill="#444444"/>
  <text x="620" y="278" font-family="monospace" font-size="8" fill="#888888">depends on</text>

  <!-- ── LAYER 2: CONFIGURATOR ──────────────────────────────────── -->
  <text x="52" y="390" font-family="monospace" font-size="9" letter-spacing="2" fill="#888888" text-anchor="end" transform="rotate(-90 52 390)">LAYER 2</text>

  <rect x="80" y="292" width="1060" height="148" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="108" y="320" font-family="monospace" font-size="10" letter-spacing="2" fill="#888888">CONFIGURATOR LAYER  ·  PROMPT MANAGEMENT</text>
  <line x1="80" y1="328" x2="1140" y2="328" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Configurator flow: draft → test harness → approve → publish -->
  <rect x="108" y="340" width="100" height="44" rx="5" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="158" y="358" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">DRAFT</text>
  <text x="158" y="372" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">configurator</text>

  <line x1="208" y1="362" x2="244" y2="362" stroke="#444444" stroke-width="1.5"/>
  <polygon points="244,362 236,358 236,366" fill="#444444"/>

  <rect x="244" y="340" width="140" height="44" rx="5" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <text x="314" y="358" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">TEST HARNESS</text>
  <text x="314" y="372" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">synthetic + historical</text>

  <line x1="384" y1="362" x2="420" y2="362" stroke="#444444" stroke-width="1.5"/>
  <polygon points="420,362 412,358 412,366" fill="#444444"/>

  <rect x="420" y="340" width="110" height="44" rx="5" fill="#FFFFFF" stroke="#444444" stroke-width="1.5"/>
  <text x="475" y="358" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">APPROVE</text>
  <text x="475" y="372" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">reviewer</text>

  <line x1="530" y1="362" x2="566" y2="362" stroke="#444444" stroke-width="1.5"/>
  <polygon points="566,362 558,358 558,366" fill="#444444"/>

  <rect x="566" y="340" width="110" height="44" rx="5" fill="#0A0A0A"/>
  <text x="621" y="366" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">PUBLISH</text>

  <!-- Version history note -->
  <rect x="700" y="340" width="420" height="44" rx="5" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="910" y="358" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">VERSION HISTORY</text>
  <text x="910" y="372" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">who approved · test results at time of publish · audit trail</text>

  <!-- Configurator layer governs what the operator layer sees -->
  <rect x="108" y="400" width="572" height="22" rx="3" fill="#FFE500" fill-opacity="0.10"/>
  <text x="394" y="415" font-family="monospace" font-size="8" letter-spacing="1.5" fill="#7A5F00" text-anchor="middle">prompts published here directly govern what the confidence gate routes above</text>

  <!-- Down arrow: configurator → fallback -->
  <line x1="600" y1="440" x2="600" y2="476" stroke="#444444" stroke-width="2"/>
  <polygon points="600,476 595,466 605,466" fill="#444444"/>
  <text x="620" y="462" font-family="monospace" font-size="8" fill="#888888">safety net when this layer fails</text>

  <!-- ── LAYER 3: FALLBACK ──────────────────────────────────────── -->
  <text x="52" y="570" font-family="monospace" font-size="9" letter-spacing="2" fill="#888888" text-anchor="end" transform="rotate(-90 52 570)">LAYER 3</text>

  <rect x="80" y="476" width="1060" height="148" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="108" y="504" font-family="monospace" font-size="10" letter-spacing="2" fill="#888888">FALLBACK LAYER  ·  REVIEW QUEUE</text>
  <line x1="80" y1="512" x2="1140" y2="512" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Fallback queue -->
  <rect x="108" y="524" width="220" height="44" rx="5" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.5"/>
  <text x="218" y="542" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">FALLBACK QUEUE</text>
  <text x="218" y="556" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">separate SLA · dedicated owner</text>

  <line x1="328" y1="546" x2="364" y2="546" stroke="#444444" stroke-width="1.5"/>
  <polygon points="364,546 356,542 356,550" fill="#444444"/>

  <rect x="364" y="524" width="140" height="44" rx="5" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="434" y="546" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">OPERATOR REVIEWS</text>
  <text x="434" y="558" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">owns the decision</text>

  <!-- "NOT CAUGHT" box inside fallback layer -->
  <rect x="700" y="520" width="420" height="76" rx="5" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
  <rect x="700" y="520" width="420" height="28" rx="5" fill="#0A0A0A"/>
  <rect x="700" y="538" width="420" height="10" fill="#0A0A0A"/>
  <text x="910" y="538" font-family="monospace" font-size="9" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">SYSTEM LIMIT — NOT CAUGHT</text>
  <text x="910" y="560" font-family="monospace" font-size="9" fill="#0A0A0A" text-anchor="middle">high confidence · incorrect classification</text>
  <text x="910" y="574" font-family="monospace" font-size="8" fill="#444444" text-anchor="middle">routes straight through all three layers · undetected</text>
  <text x="910" y="586" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">the harder problem · still unsolved</text>

  <!-- Feedback arc: fallback → configurator (dashed) -->
  <path d="M 328 546 Q 80 546 80 362 Q 80 200 108 178" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
  <polygon points="108,178 100,190 114,190" fill="#888888"/>
  <text x="70" y="400" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle" transform="rotate(-90 70 400)">informs prompt refinement</text>

  <!-- Annotation: why this is one system -->
  <rect x="108" y="648" width="1032" height="32" rx="5" fill="#FFE500" fill-opacity="0.08" stroke="#E0E0E0" stroke-width="1"/>
  <text x="624" y="662" font-family="monospace" font-size="9" letter-spacing="1" fill="#444444" text-anchor="middle">three layers because fixing one without the others doesn't hold —</text>
  <text x="624" y="674" font-family="monospace" font-size="9" letter-spacing="1" fill="#0A0A0A" text-anchor="middle">a better confidence gate still needs correct prompts · correct prompts still need a fallback when the AI is wrong</text>

  <!-- Legend -->
  <line x1="60" y1="754" x2="1140" y2="754" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="762" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.5"/>
  <text x="78" y="772" font-family="monospace" font-size="9" fill="#444444">design artifact / primary component</text>
  <rect x="282" y="762" width="12" height="12" rx="2" fill="#FFE500" fill-opacity="0.2" stroke="#7A5F00" stroke-width="1"/>
  <text x="300" y="772" font-family="monospace" font-size="9" fill="#444444">inter-layer dependency</text>
  <rect x="464" y="762" width="12" height="12" rx="2" fill="#0A0A0A"/>
  <text x="482" y="772" font-family="monospace" font-size="9" fill="#444444">system limit — undetected failure mode</text>
  <line x1="700" y1="767" x2="722" y2="767" stroke="#888888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="728" y="772" font-family="monospace" font-size="9" fill="#444444">feedback loop between layers</text>
  <text x="1140" y="772" font-family="monospace" font-size="9" fill="#888888" text-anchor="end">Allianz · IDAS · System Overview</text>
</svg>
