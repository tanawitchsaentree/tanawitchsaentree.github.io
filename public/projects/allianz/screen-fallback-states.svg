<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#FFFFFF"/>
  <text x="60" y="48" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">FALLBACK STATES  ·  SYSTEM DIAGRAM</text>
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title: failure mode taxonomy -->
  <text x="600" y="96" font-family="monospace" font-size="9" letter-spacing="2" fill="#888888" text-anchor="middle">WHAT THE SYSTEM CATCHES  ·  AND WHAT IT DOES NOT</text>

  <!-- ── TIER STRUCTURE ────────────────────────────────────────── -->

  <!-- TIER 0: document intake header -->
  <rect x="360" y="116" width="480" height="44" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="600" y="136" font-family="monospace" font-size="11" letter-spacing="1.5" fill="#0A0A0A" text-anchor="middle">DOCUMENT ENTERS IDAS</text>
  <text x="600" y="150" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">AI processes · assigns classification · evaluates confidence</text>

  <!-- Vertical trunk -->
  <line x1="600" y1="160" x2="600" y2="196" stroke="#444444" stroke-width="2"/>
  <polygon points="600,196 595,186 605,186" fill="#444444"/>

  <!-- ── TIER 1: LOW CONFIDENCE ────────────────────────────────── -->
  <rect x="174" y="196" width="248" height="56" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="298" y="220" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">LOW CONFIDENCE</text>
  <text x="298" y="236" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">score below threshold</text>
  <text x="298" y="248" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">AI uncertain · threshold configurable</text>

  <!-- Branch line left -->
  <line x1="600" y1="196" x2="420" y2="196" stroke="#444444" stroke-width="1.5"/>
  <line x1="420" y1="196" x2="422" y2="196" stroke="#444444" stroke-width="1.5"/>
  <line x1="422" y1="196" x2="422" y2="224" stroke="#444444" stroke-width="1.5"/>

  <!-- ── TIER 1: UNRECOGNIZED DOC TYPE ─────────────────────────── -->
  <rect x="778" y="196" width="248" height="56" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="902" y="220" font-family="monospace" font-size="10" fill="#444444" text-anchor="middle">UNRECOGNIZED TYPE</text>
  <text x="902" y="236" font-family="monospace" font-size="9" fill="#888888" text-anchor="middle">document type not in schema</text>
  <text x="902" y="248" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">no category matches</text>

  <!-- Branch line right -->
  <line x1="600" y1="196" x2="778" y2="196" stroke="#444444" stroke-width="1.5"/>
  <line x1="778" y1="196" x2="778" y2="224" stroke="#444444" stroke-width="1.5"/>

  <!-- Both feed into fallback queue -->
  <line x1="298" y1="252" x2="298" y2="286" stroke="#444444" stroke-width="1.5"/>
  <line x1="298" y1="286" x2="600" y2="286" stroke="#444444" stroke-width="1.5"/>
  <line x1="902" y1="252" x2="902" y2="286" stroke="#444444" stroke-width="1.5"/>
  <line x1="902" y1="286" x2="600" y2="286" stroke="#444444" stroke-width="1.5"/>
  <line x1="600" y1="286" x2="600" y2="320" stroke="#444444" stroke-width="2"/>
  <polygon points="600,320 595,310 605,310" fill="#444444"/>

  <!-- CAUGHT label -->
  <rect x="340" y="276" width="80" height="18" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="380" y="289" font-family="monospace" font-size="8" letter-spacing="1.5" fill="#444444" text-anchor="middle">CAUGHT</text>
  <rect x="780" y="276" width="80" height="18" rx="3" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="820" y="289" font-family="monospace" font-size="8" letter-spacing="1.5" fill="#444444" text-anchor="middle">CAUGHT</text>

  <!-- FALLBACK QUEUE — design artifact -->
  <rect x="360" y="320" width="480" height="100" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.5"/>
  <rect x="360" y="320" width="480" height="36" rx="8" fill="#0A0A0A"/>
  <rect x="360" y="346" width="480" height="10" fill="#0A0A0A"/>
  <text x="600" y="343" font-family="monospace" font-size="10" letter-spacing="2.5" fill="#FFFFFF" text-anchor="middle">FALLBACK REVIEW QUEUE</text>
  <text x="600" y="376" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">separate queue · different SLA · dedicated ownership</text>
  <text x="600" y="392" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">different triage rhythm  ·  leading indicator for capacity planning</text>
  <text x="600" y="408" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">not overflow — a different kind of work</text>

  <!-- Arrow: fallback queue to operator decision -->
  <line x1="600" y1="420" x2="600" y2="456" stroke="#0A0A0A" stroke-width="2"/>
  <polygon points="600,456 595,446 605,446" fill="#0A0A0A"/>

  <!-- Operator decision -->
  <rect x="420" y="456" width="360" height="60" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="600" y="479" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">OPERATOR REVIEWS</text>
  <text x="600" y="495" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">sees AI lean · confidence · reason</text>
  <text x="600" y="507" font-family="monospace" font-size="8" fill="#888888" text-anchor="middle">owns the decision — not a fix, a handoff</text>

  <!-- Feedback arc back to configurator (dotted) -->
  <path d="M 778 370 Q 870 370 920 280 Q 960 200 920 148" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4" fill="none"/>
  <polygon points="920,148 913,160 923,162" fill="#888888"/>
  <text x="960" y="276" font-family="monospace" font-size="8" fill="#888888" text-anchor="start">feeds back to</text>
  <text x="960" y="288" font-family="monospace" font-size="8" fill="#888888" text-anchor="start">prompt management</text>

  <!-- ═══════════════════════════════════════════════════════════
       TIER 3: THE UNSOLVED PROBLEM — MOST PROMINENT ANNOTATION
  ═══════════════════════════════════════════════════════════ -->

  <!-- High confidence wrong — separate branch -->
  <line x1="600" y1="196" x2="600" y2="176" stroke="#444444" stroke-width="1.5"/>
  <line x1="600" y1="176" x2="960" y2="176" stroke="#444444" stroke-width="1.5"/>
  <line x1="960" y1="176" x2="960" y2="320" stroke="#444444" stroke-width="1.5"/>
  <polygon points="960,320 955,310 965,310" fill="#444444"/>

  <!-- Confidently wrong box — heavy border, prominent -->
  <rect x="834" y="320" width="286" height="128" rx="8" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="3"/>
  <rect x="834" y="320" width="286" height="36" rx="8" fill="#0A0A0A"/>
  <rect x="834" y="346" width="286" height="10" fill="#0A0A0A"/>
  <text x="977" y="343" font-family="monospace" font-size="9" letter-spacing="1.5" fill="#FFFFFF" text-anchor="middle">CONFIDENTLY WRONG</text>
  <text x="977" y="374" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">score ≥ threshold</text>
  <text x="977" y="390" font-family="monospace" font-size="10" fill="#0A0A0A" text-anchor="middle">classification incorrect</text>
  <text x="977" y="406" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">routes straight through</text>
  <text x="977" y="420" font-family="monospace" font-size="9" fill="#444444" text-anchor="middle">no fallback triggered</text>

  <!-- NOT CAUGHT stamp — most prominent annotation -->
  <rect x="840" y="434" width="274" height="28" rx="4" fill="#0A0A0A"/>
  <text x="977" y="452" font-family="monospace" font-size="11" letter-spacing="3" fill="#FFFFFF" text-anchor="middle">NOT CAUGHT  ·  UNSOLVED</text>

  <!-- Large annotation callout pointing to NOT CAUGHT box -->
  <line x1="1120" y1="410" x2="1120" y2="600" stroke="#0A0A0A" stroke-width="1.5"/>
  <line x1="1120" y1="450" x2="1140" y2="450" stroke="#0A0A0A" stroke-width="1.5"/>
  <rect x="834" y="474" width="274" height="58" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="977" y="491" font-family="monospace" font-size="8.5" fill="#444444" text-anchor="middle">The fallback system catches</text>
  <text x="977" y="503" font-family="monospace" font-size="8.5" fill="#444444" text-anchor="middle">uncertainty the AI knows about.</text>
  <text x="977" y="516" font-family="monospace" font-size="8.5" fill="#444444" text-anchor="middle">It does not catch the AI being</text>
  <text x="977" y="528" font-family="monospace" font-size="8.5" fill="#0A0A0A" text-anchor="middle" font-weight="bold">confidently wrong.</text>

  <!-- Legend -->
  <line x1="60" y1="754" x2="1140" y2="754" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="762" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.5"/>
  <text x="78" y="772" font-family="monospace" font-size="9" fill="#444444">design artifact / primary queue</text>
  <rect x="280" y="762" width="12" height="12" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="298" y="772" font-family="monospace" font-size="9" fill="#444444">caught by system</text>
  <rect x="436" y="762" width="12" height="12" rx="2" fill="#0A0A0A"/>
  <text x="454" y="772" font-family="monospace" font-size="9" fill="#444444">not caught — honest system limit</text>
  <line x1="650" y1="767" x2="672" y2="767" stroke="#888888" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="678" y="772" font-family="monospace" font-size="9" fill="#444444">feedback to configurator</text>
  <text x="1140" y="772" font-family="monospace" font-size="9" fill="#888888" text-anchor="end">Allianz · IDAS · Fallback States</text>
</svg>
